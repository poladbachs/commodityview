    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0b0d;
      --bg-1: #111316;
      --bg-2: #161a1f;
      --bg-3: #1d2128;
      --line: #24292f;
      --line-2: #2e343c;
      --ink: #e8e6df;
      --ink-dim: #a7a8a4;
      --ink-faint: #6b6e73;
      --accent: #f5a524;
      /* amber */
      --accent-2: #5bd6a1;
      /* green pass */
      --accent-3: #ff5b57;
      /* red fail */
      --accent-4: #6ec1ff;
      /* blue info */
      --accent-5: #c77dff;
      /* violet */
      --grid: rgba(255, 255, 255, 0.035);
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
      --serif: 'Instrument Serif', 'Times New Roman', serif;
    }

    .theme-light {
      --bg: #f4f1ea;
      --bg-1: #efece4;
      --bg-2: #e8e4da;
      --bg-3: #dfdbd0;
      --line: #cfc9ba;
      --line-2: #b9b3a1;
      --ink: #1a1b1d;
      --ink-dim: #4a4b4d;
      --ink-faint: #7a7a77;
      --grid: rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
    }

    button {
      font-family: inherit;
      color: inherit;
    }

    input,
    textarea,
    select {
      font-family: inherit;
      color: inherit;
    }

    ::selection {
      background: var(--accent);
      color: #0a0b0d;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--line-2);
      border-radius: 0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--ink-faint);
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>

    // Rotating dotted globe adapted from the app globe component.

    const GLOBE_PORTS = [

      { code: 'SIN', name: 'Singapore', lat: 1.35, lng: 103.82, size: 5 },

      { code: 'DXB', name: 'Dubai', lat: 25.2, lng: 55.27, size: 4 },
      { code: 'SHA', name: 'Shanghai', lat: 31.23, lng: 121.47, size: 4 },
      { code: 'TUA', name: 'Novorossiysk', lat: 44.7, lng: 37.77, size: 3.5 },

    const pointInPolygon = (point, polygon) => {
      const [x, y] = point;
      let inside = false;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [xi, yi] = polygon[i];
        const [xj, yj] = polygon[j];
        if (yi > y !== yj > y && x < (xj - xi) * (y - yi) / (yj - yi) + xi) inside = !inside;
      }
      return inside;
    };

    const pointInFeature = (point, feature) => {
      const g = feature.geometry;
      if (g.type === 'Polygon') {
        if (!pointInPolygon(point, g.coordinates[0])) return false;
        for (let i = 1; i < g.coordinates.length; i++) {
          if (pointInPolygon(point, g.coordinates[i])) return false;
        }
        return true;
      }
      if (g.type === 'MultiPolygon') {
        for (const polygon of g.coordinates) {
          if (pointInPolygon(point, polygon[0])) {
            let inHole = false;
            for (let i = 1; i < polygon.length; i++) {
              if (pointInPolygon(point, polygon[i])) {
                inHole = true;
                break;
              }
            }
            if (!inHole) return true;
          }
        }
        return false;
      }
      return false;
    };

      const dots = [];
      const bounds = d3.geoBounds(feature);
      const minLng = bounds[0][0];
      const minLat = bounds[0][1];
      const maxLng = bounds[1][0];
      const maxLat = bounds[1][1];
      for (let lng = minLng; lng <= maxLng; lng += stepDeg) {
        for (let lat = minLat; lat <= maxLat; lat += stepDeg) {
          if (pointInFeature([lng, lat], feature)) {
            dots.push([lng, lat]);
          }
        }
      }
      if (dots.length <= maxDots) return dots;

      const sampled = [];
      const stride = dots.length / maxDots;
      for (let i = 0; i < maxDots; i++) {
        sampled.push(dots[Math.floor(i * stride)]);
      }
      return sampled;
    };

    const WorldMap = ({ width = 900, height = 500 }) => {

        canvas.style.height = `${containerHeight}px`;

              prev = null;

          haze.addColorStop(1, 'rgba(245,158,11,0)');

          context.fillRect(0, 0, containerWidth, containerHeight);

          const sweep = context.createLinearGradient(sweepX, 0, sweepX + containerWidth * 0.26, 0);
          sweep.addColorStop(0, 'rgba(245,158,11,0)');
          sweep.addColorStop(0.5, 'rgba(245,158,11,0.07)');
          sweep.addColorStop(1, 'rgba(245,158,11,0)');
          context.fillStyle = sweep;
          context.fillRect(0, 0, containerWidth, containerHeight);

          context.strokeStyle = 'rgba(245,158,11,0.03)';
          context.lineWidth = Math.max(0.5, 0.6 * sf);
          const gridStep = Math.max(42, Math.floor(containerWidth / 15));
          for (let x = 0; x <= containerWidth; x += gridStep) {
            context.beginPath();
            context.moveTo(x + 0.5, 0);
            context.lineTo(x + 0.5, containerHeight);
            context.stroke();
          }
          for (let y = 0; y <= containerHeight; y += gridStep) {
            context.beginPath();
            context.moveTo(0, y + 0.5);
            context.lineTo(containerWidth, y + 0.5);
            context.stroke();
          }

          const graticule = d3.geoGraticule().step([20, 20]);
          context.beginPath();
          path(graticule());
          context.strokeStyle = 'rgba(245,158,11,0.08)';
          context.lineWidth = 0.7 * sf;
          context.stroke();

          if (!landFeatures) return;

          context.beginPath();
          landFeatures.features.forEach((f) => path(f));
          context.fillStyle = 'rgba(245,158,11,0.035)';
          context.fill();

          context.beginPath();
          landFeatures.features.forEach((f) => path(f));
          context.strokeStyle = 'rgba(245,158,11,0.33)';
          context.lineWidth = 0.8 * sf;
          context.stroke();

          allDots.forEach((dot) => {
            const proj = projection([dot.lng, dot.lat]);
            if (!proj) return;
            const px = proj[0];
            const py = proj[1];
            const alpha = 0.42 + 0.26 * (0.5 + 0.5 * Math.sin((dot.lng + dot.lat) * 0.12 + elapsedMs * 0.0014));
            const r = (0.72 + 0.48 * (0.5 + 0.5 * Math.cos(dot.lat * 0.16))) * sf;
            context.beginPath();
            context.arc(px, py, r, 0, 2 * Math.PI);
            context.fillStyle = `rgba(245,158,11,${alpha.toFixed(3)})`;
            context.fill();
          });

          const routeTime = elapsedMs * 0.00011;
          routePairs.forEach((pair, idx) => {
            const [a, b] = pair;
            const primaryLane = HUB_CODES.has(a.code) || HUB_CODES.has(b.code);
            const interp = d3.geoInterpolate([a.lng, a.lat], [b.lng, b.lat]);
            const samples = 56;

            const routePoints = [];
            for (let i = 0; i <= samples; i++) {
              routePoints.push(projection(interp(i / samples)));
            }

            strokeSegmentedLine(routePoints, () => {
              context.strokeStyle = 'rgba(245,158,11,0.12)';
              context.lineWidth = (primaryLane ? 1.15 : 0.9) * sf;
              context.lineCap = 'round';
              context.lineJoin = 'round';
              context.stroke();
            });

            strokeSegmentedLine(routePoints, () => {
              context.strokeStyle = primaryLane ? 'rgba(245,158,11,0.14)' : 'rgba(245,158,11,0.09)';
              context.lineWidth = (primaryLane ? 3.4 : 2.7) * sf;
              context.lineCap = 'round';
              context.lineJoin = 'round';
              context.stroke();
            });

            const headT = (routeTime + idx * 0.137) % 1;

            const drawTracerSegment = (startT, endT) => {

              const segmentPoints = [];
              for (let s = 0; s <= segSamples; s++) {

                context.strokeStyle = 'rgba(245,158,11,0.9)';
                context.lineWidth = 1.95 * sf;
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.stroke();
              });

                context.strokeStyle = 'rgba(245,158,11,0.26)';
                context.lineWidth = 4.6 * sf;
                context.lineCap = 'round';
                context.lineJoin = 'round';
                context.stroke();
              });
            };

            if (headT >= windowT) {
              drawTracerSegment(headT - windowT, headT);
            } else {
              drawTracerSegment(0, headT);
              drawTracerSegment(1 - (windowT - headT), 1);
            }

            const tp = projection(interp(headT));
            if (tp) {
              const tx = tp[0];
              const ty = tp[1];
              context.beginPath();
              context.arc(tx, ty, 2.35 * sf, 0, 2 * Math.PI);
              context.fillStyle = 'rgba(245,158,11,0.95)';
              context.fill();
              context.beginPath();
              context.arc(tx, ty, 3.7 * sf, 0, 2 * Math.PI);
              context.strokeStyle = 'rgba(251,191,36,0.6)';
              context.lineWidth = 0.9 * sf;
              context.stroke();
              context.beginPath();
              context.arc(tx, ty, 6.1 * sf, 0, 2 * Math.PI);
              context.strokeStyle = 'rgba(245,158,11,0.32)';
              context.lineWidth = 1.0 * sf;
              context.stroke();
            }
          });

          pulsePhase += 0.024;
          GLOBE_PORTS.forEach((port) => {
            const proj = projection([port.lng, port.lat]);
            if (!proj) return;
            const px = proj[0];
            const py = proj[1];
            const isHub = HUB_CODES.has(port.code);

            const t = ((pulsePhase + port.lat * 0.08) % (Math.PI * 2)) / (Math.PI * 2);
            const pingR = Math.max(0.01, port.size * (1 + t * 2.1) * sf);
            const pingAlpha = Math.max(0, 0.35 * (1 - t));
            context.beginPath();
            context.arc(px, py, pingR, 0, 2 * Math.PI);
            context.strokeStyle = `rgba(245,158,11,${pingAlpha})`;
            context.lineWidth = 0.7 * sf;
            context.stroke();

            const midR = Math.max(0.01, port.size * 0.65 * sf);
            context.beginPath();
            context.arc(px, py, midR, 0, 2 * Math.PI);
            context.strokeStyle = 'rgba(245,158,11,0.55)';
            context.lineWidth = 0.8 * sf;
            context.stroke();

            if (isHub) {
              context.beginPath();
              context.arc(px, py, Math.max(0.01, port.size * 1.25 * sf), 0, 2 * Math.PI);
              context.strokeStyle = 'rgba(251,191,36,0.35)';
              context.lineWidth = 0.9 * sf;
              context.stroke();
            }

            const coreR = Math.max(0.01, port.size * 0.28 * sf);
            context.beginPath();
            context.arc(px, py, coreR, 0, 2 * Math.PI);
            context.fillStyle = isHub ? '#FBBF24' : '#F59E0B';
            context.fill();

            context.font = `${Math.max(8, 9.5 * sf)}px ui-monospace, SFMono-Regular, Menlo, monospace`;
            context.fillStyle = isHub ? 'rgba(251,191,36,0.78)' : 'rgba(245,158,11,0.55)';
            context.fillText(port.name.split(' ')[0].toUpperCase(), px + 6 * sf, py - 6 * sf);
          });

          const vignette = context.createRadialGradient(
            containerWidth / 2,
            containerHeight / 2,
            Math.min(containerWidth, containerHeight) * 0.34,
            containerWidth / 2,
            containerHeight / 2,
            Math.max(containerWidth, containerHeight) * 0.72
          );
          vignette.addColorStop(0, 'rgba(0,0,0,0)');
          vignette.addColorStop(1, 'rgba(0,0,0,0.28)');
          context.fillStyle = vignette;
          context.fillRect(0, 0, containerWidth, containerHeight);
        };

        const loadData = async () => {
          if (cachedLandFeatures && cachedDots) {
            landFeatures = cachedLandFeatures;
            allDots.push(...cachedDots);
            return;
          }

          const candidates = [
            '/ne_110m_land.json',
            '../public/ne_110m_land.json',
            './public/ne_110m_land.json',
            'https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_land.geojson',
            'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_land.geojson'
          ];
          let response = null;
          for (const candidate of candidates) {
            try {
              const r = await fetch(candidate);
              if (r.ok) {

              }
            } catch {
              // Try next candidate path.
            }
          }
          if (!response) return;
          landFeatures = await response.json();
          projection.fitExtent(
            [
              [containerWidth * 0.04, containerHeight * 0.08],
              [containerWidth * 0.96, containerHeight * 0.92]

          );

          const localDots = [];
          for (const feature of landFeatures.features) {
            const dots = generateDots(feature);
            for (const item of dots) {
              localDots.push({ lng: item[0], lat: item[1] });
            }
          }

          cachedLandFeatures = landFeatures;
          cachedDots = localDots;
          allDots.push(...localDots);
        };

        let timer = null;
        loadData().then(() => {
          timer = d3.timer((elapsed) => {
            render(elapsed);
          });
        });

        return () => {
          if (timer) timer.stop();
        };
      }, [width, height]);

      return (
        <div ref={containerRef} style={{ width: '100%', height: '100%', position: 'relative', background: '#050A14' }}>
          <canvas
            ref={canvasRef}
            style={{ width: '100%', height: '100%', display: 'block' }}
          />
        </div>
      );
    };

    // Landing page — /home

    const Landing = ({ onNav }) => {

            }}>
              <div style={{

                <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-faint)' }}>{deal.id} · LAST RUN {analysis.runAt}</span>
              </div>
              <h1 style={{ margin: 0, fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 38, lineHeight: 1.1, letterSpacing: '-0.01em' }}>
                {deal.title}
              </h1>
              <div style={{ marginTop: 10, fontFamily: 'var(--mono)', fontSize: 11.5, color: 'var(--ink-dim)', letterSpacing: '0.04em' }}>
                {deal.origin} → {deal.destination} · {deal.vessel} · {deal.quantity} · {deal.contractPrice}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <Btn variant="default" size="md">↻ Re-run analysis</Btn>
              <Btn variant="default" size="md">↓ Export PDF</Btn>
              <Btn variant="primary" size="md" disabled={effectiveStatus === 'NON_COMPLIANT'} title={effectiveStatus === 'NON_COMPLIANT' ? 'Resolve violations to release payment' : ''}>
                {effectiveStatus === 'NON_COMPLIANT' ? '✗ Hold payment' : '✓ Release payment'}
              </Btn>
            </div>
          </div>

          {showLoading ?
            <LoadingPanel /> :

            <>
              {/* Summary strip */}
              <div style={{
                display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)',
                border: '1px solid var(--line)', marginBottom: 24, background: 'var(--bg-1)'
              }}>
                <Summary label="Parameters" value={analysis.checks.length} sub="cross-checked" />
                <Summary label="Passed" value={passes} color="var(--accent-2)" sub="within spec" />
                <Summary label="Warnings" value={warns} color="var(--accent)" sub="within tolerance" />
                <Summary label="Violations" value={fails} color="var(--accent-3)" sub="above spec" />
                <Summary label="Runtime" value={analysis.runtime} sub="1 COA · 1 contract" mono />
              </div>

              {/* Two-column: violations + sidebar */}
              <div style={{ display: 'grid', gridTemplateColumns: '1.7fr 1fr', gap: 24 }}>
                <div>
                  <ViolationsPanel analysis={analysis} />
                  <ComparisonTable analysis={analysis} />
                  <Traceability analysis={analysis} />
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                  <DocPanel tab={tab} setTab={setTab} analysis={analysis} />
                  <VerdictCard analysis={analysis} status={effectiveStatus} fails={fails} warns={warns} passes={passes} />
                  <RecommendCard status={effectiveStatus} />
                </div>
              </div>
            </>
          }
        </div>);

    };

    const Summary = ({ label, value, color, sub, mono }) =>
      <div style={{ padding: '18px 20px', borderRight: '1px solid var(--line)' }}>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--ink-faint)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{label}</div>
        <div style={{ fontFamily: mono ? 'var(--mono)' : 'var(--serif)', fontSize: mono ? 26 : 34, fontWeight: 400, color: color || 'var(--ink)', marginTop: 4, lineHeight: 1 }}>{value}</div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--ink-faint)', letterSpacing: '0.05em', marginTop: 6 }}>{sub}</div>
      </div>;


    const LoadingPanel = () => {
      const steps = [
        { label: 'Parsing COA (3 pages)', done: true },
        { label: 'Extracting parameters with LLM', done: true },
        { label: 'Parsing Contract (14 pages)', done: true },
        { label: 'Extracting contract specs', done: false, active: true },
        { label: 'Running rules engine', done: false },
        { label: 'Generating verdict + report', done: false }];

      return (
        <CrossCorners style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', padding: 36 }}>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent)', letterSpacing: '0.14em' }}>ANALYSIS IN PROGRESS</div>
          <h2 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 32, margin: '8px 0 24px' }}>Extracting documents…</h2>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {steps.map((s, i) =>
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, fontFamily: 'var(--mono)', fontSize: 12.5 }}>
                <span style={{
                  width: 14, height: 14, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  border: `1px solid ${s.done ? 'var(--accent-2)' : s.active ? 'var(--accent)' : 'var(--line-2)'}`,
                  color: s.done ? 'var(--accent-2)' : 'var(--accent)',
                  fontSize: 9
                }}>
                  {s.done ? '✓' : s.active ? '•' : ''}
                </span>
                <span style={{ color: s.done ? 'var(--ink)' : s.active ? 'var(--ink)' : 'var(--ink-faint)' }}>{s.label}</span>
                {s.active && <span style={{ color: 'var(--accent)', letterSpacing: '0.4em' }}>···</span>}
              </div>
            )}
          </div>
          <div style={{ marginTop: 28, height: 2, background: 'var(--bg-3)', position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', width: '40%', height: '100%', background: 'var(--accent)', animation: 'loadbar 1.6s ease-in-out infinite' }} />
          </div>
          <style>{`@keyframes loadbar { 0% { left: -40%; } 100% { left: 100%; } }`}</style>
        </CrossCorners>);

    };

    const ViolationsPanel = ({ analysis }) => {
      const violations = analysis.checks.filter((c) => c.result === 'FAIL' || c.result === 'WARN');
      if (violations.length === 0) {
        return (
          <CrossCorners style={{ background: 'var(--bg-1)', border: '1px solid rgba(91,214,161,0.35)', padding: 24, marginBottom: 24 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent-2)', letterSpacing: '0.12em' }}>✓ ALL CLEAR</div>
            <h3 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 26, margin: '8px 0 4px' }}>No violations detected</h3>
            <div style={{ color: 'var(--ink-dim)', fontSize: 13 }}>Every parameter on the certificate matches the contract spec. Safe to release payment.</div>
          </CrossCorners>);

      }
      return (
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
            <div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent-3)', letterSpacing: '0.12em' }}>▲ VIOLATIONS · {violations.length} FLAGGED</div>
              <h3 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 26, margin: '4px 0 0' }}>What went wrong</h3>
            </div>
            <span style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--ink-faint)', letterSpacing: '0.06em' }}>CLICK A ROW FOR SOURCE →</span>
          </div>
          <div style={{ border: '1px solid var(--line)', background: 'var(--bg-1)' }}>
            {violations.map((v, i) =>
              <ViolationRow key={i} v={v} last={i === violations.length - 1} />
            )}
          </div>
        </div>);

    };

    const ViolationRow = ({ v, last }) => {
      const [open, setOpen] = React.useState(false);
      const accent = v.result === 'FAIL' ? 'var(--accent-3)' : 'var(--accent)';
      return (
        <div style={{ borderBottom: last ? 'none' : '1px solid var(--line)' }}>
          <div onClick={() => setOpen((o) => !o)} style={{
            display: 'grid', gridTemplateColumns: '80px 1.5fr 1fr 1fr 24px',
            alignItems: 'center', gap: 16, padding: '14px 18px', cursor: 'pointer',
            borderLeft: `2px solid ${accent}`
          }}>
            <ResultTag result={v.result} />
            <div>
              <div style={{ fontSize: 14, color: 'var(--ink)', fontWeight: 500 }}>{v.param}</div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--ink-faint)', marginTop: 2 }}>{v.source}</div>
            </div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: accent }}>{v.coa}</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 13, color: 'var(--ink-dim)' }}>spec {v.spec}</div>
            <div style={{ color: 'var(--ink-faint)', transform: open ? 'rotate(90deg)' : '', transition: 'transform 120ms' }}>›</div>
          </div>
          {open &&
            <div style={{ padding: '0 18px 16px 100px', color: 'var(--ink-dim)', fontSize: 13, lineHeight: 1.55, background: 'var(--bg-2)' }}>
              <div style={{ paddingTop: 14, borderTop: '1px dashed var(--line-2)' }}>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent)', letterSpacing: '0.1em', marginBottom: 6 }}>REASON</div>
                {v.reason}
                <div style={{ marginTop: 10, display: 'flex', gap: 8 }}>
                  <Btn size="sm" variant="ghost">Open source ↗</Btn>
                  <Btn size="sm" variant="ghost">Dispute clause</Btn>
                  <Btn size="sm" variant="ghost">Suppress (one-time)</Btn>
                </div>
              </div>
            </div>
          }
        </div>);

    };

    const ComparisonTable = ({ analysis }) => {
      const [filter, setFilter] = React.useState('ALL');
      const rows = analysis.checks.filter((c) => filter === 'ALL' || c.result === filter);
      return (
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 12 }}>
            <div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent)', letterSpacing: '0.12em' }}>COMPARISON · ALL PARAMETERS</div>
              <h3 style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 26, margin: '4px 0 0' }}>Every number, side by side</h3>
            </div>
            <div style={{ display: 'flex', gap: 0, border: '1px solid var(--line-2)' }}>
              {['ALL', 'FAIL', 'WARN', 'PASS'].map((k) =>
                <div key={k} onClick={() => setFilter(k)} style={{
                  padding: '6px 12px', fontFamily: 'var(--mono)', fontSize: 10.5, letterSpacing: '0.08em',
                  cursor: 'pointer', borderRight: k !== 'PASS' ? '1px solid var(--line-2)' : 'none',
                  color: filter === k ? 'var(--ink)' : 'var(--ink-faint)',
                  background: filter === k ? 'var(--bg-3)' : 'transparent'
                }}>{k}</div>
              )}
            </div>
          </div>
          <div style={{ border: '1px solid var(--line)', background: 'var(--bg-1)', overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ borderBottom: '1px solid var(--line)', background: 'var(--bg-2)' }}>
                  {['Parameter', 'COA value', 'Spec', 'Tolerance', 'Result', 'Source'].map((h) =>
                    <th key={h} style={{ textAlign: 'left', padding: '10px 14px', fontFamily: 'var(--mono)', fontSize: 10.5, fontWeight: 500, color: 'var(--ink-faint)', letterSpacing: '0.08em', textTransform: 'uppercase' }}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {rows.map((c, i) =>
                  <tr key={i} style={{ borderBottom: '1px solid var(--line)' }}>
                    <td style={{ padding: '11px 14px', color: 'var(--ink)' }}>{c.param}</td>
                    <td style={{ padding: '11px 14px', fontFamily: 'var(--mono)', color: c.result === 'PASS' ? 'var(--ink)' : c.result === 'WARN' ? 'var(--accent)' : 'var(--accent-3)' }}>{c.coa}</td>
                    <td style={{ padding: '11px 14px', fontFamily: 'var(--mono)', color: 'var(--ink-dim)' }}>{c.spec}</td>
                    <td style={{ padding: '11px 14px', fontFamily: 'var(--mono)', color: 'var(--ink-faint)' }}>{c.tol}</td>
                    <td style={{ padding: '11px 14px' }}><ResultTag result={c.result} /></td>
                    <td style={{ padding: '11px 14px', fontFamily: 'var(--mono)', fontSize: 11.5, color: 'var(--ink-faint)' }}>{c.source}</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>);

    };

    const Traceability = ({ analysis }) =>
      <div style={{
        marginBottom: 24, padding: '16px 18px',
        border: '1px solid var(--line)', background: 'var(--bg-1)',
        fontFamily: 'var(--mono)', fontSize: 11.5, color: 'var(--ink-dim)', lineHeight: 1.7,
        letterSpacing: '0.02em'
      }}>
        <div style={{ color: 'var(--ink-faint)', letterSpacing: '0.1em', marginBottom: 8 }}>TRACEABILITY · SOURCE PROVENANCE</div>
        ┌─ COA &nbsp;&nbsp;&nbsp;{analysis.docCOA.filename} · {analysis.docCOA.pages}p · extracted {analysis.docCOA.extractedAt}<br />
        └─ CONTRACT &nbsp;{analysis.docContract.filename} · {analysis.docContract.pages}p · extracted {analysis.docContract.extractedAt}<br />
        <span style={{ color: 'var(--ink-faint)' }}>Every value above links to its originating clause. Keep this PDF; it's your audit trail.</span>
      </div>;


    const DocPanel = ({ tab, setTab, analysis }) => {
      return (
        <CrossCorners style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', padding: 0 }}>
          <div style={{ display: 'flex', borderBottom: '1px solid var(--line)' }}>
            {[['coa', 'COA'], ['contract', 'CONTRACT']].map(([k, l]) =>
              <div key={k} onClick={() => setTab(k)} style={{
                flex: 1, padding: '10px 14px', cursor: 'pointer', textAlign: 'center',
                fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.1em',
                color: tab === k ? 'var(--ink)' : 'var(--ink-faint)',
                background: tab === k ? 'var(--bg-2)' : 'transparent',
                borderBottom: tab === k ? '2px solid var(--accent)' : '2px solid transparent'
              }}>{l}</div>
            )}
          </div>
          <div style={{ padding: '16px 18px' }}>
            {tab === 'coa' ?
              <div>
                <KV label="Certificate No" value={analysis.extractedCOA.certificateNo} mono />
                <KV label="Issuer" value={analysis.extractedCOA.issuer} />
                <KV label="Issue date" value={analysis.extractedCOA.issueDate} mono />
                <KV label="Vessel" value={analysis.extractedCOA.vessel} />
                <KV label="Commodity" value={analysis.extractedCOA.commodity} />
                <KV label="Quantity" value={analysis.extractedCOA.quantity} mono />
                <KV label="Sampling date" value={analysis.extractedCOA.samplingDate} mono />
                <KV label="Sampling method" value={analysis.extractedCOA.samplingMethod} />
                <KV label="Lab method" value={analysis.extractedCOA.labMethod} />
              </div> :

              <div>
                <KV label="Contract No" value={analysis.extractedContract.contractNo} mono />
                <KV label="Counterparties" value={analysis.extractedContract.counterparties} />
                <KV label="Incoterm" value={analysis.extractedContract.incoterm} />
                <KV label="Quantity" value={analysis.extractedContract.quantity} mono />
                <KV label="Shipment" value={analysis.extractedContract.shipment} />
                <KV label="Arbitration" value={analysis.extractedContract.arbitration} />
                <KV label="Payment terms" value={analysis.extractedContract.paymentTerms} />
              </div>
            }
          </div>
        </CrossCorners>);

    };

    const VerdictCard = ({ analysis, status, fails, warns, passes }) => {
      const headline =
        status === 'COMPLIANT' ? 'Release payment.' :
          status === 'NON_COMPLIANT' ? 'Do not release. Renegotiate.' :
            'Analysis pending.';
      const color =
        status === 'COMPLIANT' ? 'var(--accent-2)' :
          status === 'NON_COMPLIANT' ? 'var(--accent-3)' :
            'var(--accent)';
      return (
        <CrossCorners style={{ background: 'var(--bg-1)', border: `1px solid ${color}33`, padding: 20 }}>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color, letterSpacing: '0.14em' }}>VERDICT</div>
          <div style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 26, lineHeight: 1.2, margin: '6px 0 14px' }}>
            {headline}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 12 }}>
            <Meter label="Pass" value={passes} max={analysis.checks.length} color="var(--accent-2)" />
            <Meter label="Warn" value={warns} max={analysis.checks.length} color="var(--accent)" />
            <Meter label="Fail" value={fails} max={analysis.checks.length} color="var(--accent-3)" />
          </div>
          <div style={{ fontSize: 12.5, color: 'var(--ink-dim)', lineHeight: 1.55 }}>
            {status === 'NON_COMPLIANT' && <>Two high-severity parameters exceed the contract maximum. Under GAFTA 125, the buyer has grounds to reject the cargo or claim a price adjustment.</>}
            {status === 'COMPLIANT' && <>Every parameter is within spec or tolerance. Documents align across COA and contract. Clear to proceed.</>}
          </div>
        </CrossCorners>);

    };

    const RecommendCard = ({ status }) => {
      const actions = status === 'NON_COMPLIANT' ?
        [
          { t: 'Send rejection notice', sub: 'Auto-generated from violations' },
          { t: 'Request price adjustment', sub: 'Per clause 8.2 (protein)' },
          { t: 'Flag supplier for review', sub: 'Third failure in 90 days' }] :

        [
          { t: 'Release payment instruction', sub: 'CAD, 3 banking days' },
          { t: 'Archive audit package', sub: 'PDF + source docs' },
          { t: 'Notify trader', sub: 'Deal closed, margin locked' }];

      return (
        <CrossCorners style={{ background: 'var(--bg-1)', border: '1px solid var(--line)', padding: 20 }}>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent)', letterSpacing: '0.14em' }}>NEXT ACTIONS</div>
          <div style={{ fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 22, margin: '6px 0 14px' }}>Suggested</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {actions.map((a, i) =>
              <div key={i} style={{
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '12px 0', borderTop: '1px dashed var(--line)', cursor: 'pointer'
              }}>
                <div>
                  <div style={{ fontSize: 13.5, color: 'var(--ink)' }}>{a.t}</div>
                  <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--ink-faint)', marginTop: 3, letterSpacing: '0.04em' }}>{a.sub}</div>
                </div>
                <span style={{ color: 'var(--ink-faint)' }}>→</span>
              </div>
            )}
          </div>
        </CrossCorners>);

    };

    // Synthetic analysis for compliant/other demo deals — generates a PASS-heavy result.
    function syntheticAnalysis(deal) {
      const base = window.ANALYSIS_SOYBEAN;
      return {
        dealId: deal.id,
        status: 'COMPLIANT',
        runAt: deal.updatedAt,
        runtime: '3.4s',
        docCOA: { filename: `COA_${deal.vessel.replace(/\s+/g, '_')}.pdf`, pages: 2, extractedAt: deal.updatedAt },
        docContract: { filename: `Contract_${deal.id}.pdf`, pages: 11, extractedAt: deal.updatedAt },
        checks: base.checks.map((c) => ({ ...c, result: 'PASS', severity: null, reason: null })),
        extractedCOA: { ...base.extractedCOA, vessel: deal.vessel, commodity: deal.commodity, quantity: deal.quantity },
        extractedContract: { ...base.extractedContract, counterparties: `${deal.buyer} (Buyer) / ${deal.seller} (Seller)` }
      };
    }

    window.DealDetail = DealDetail;


    // ===== tweaks.jsx =====
    // Tweaks panel — theme, accent, density

    const Tweaks = ({ state, setState }) => {
      const [open, setOpen] = React.useState(true);
      const update = (k, v) => {
        const next = { ...state, [k]: v };
        setState(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      };
      const accents = [
        ['amber', '#f5a524'],
        ['green', '#5bd6a1'],
        ['blue', '#6ec1ff'],
        ['violet', '#c77dff'],
        ['red', '#ff5b57']];

      return (
        <div style={{
          position: 'fixed', bottom: 18, right: 18, zIndex: 100,
          fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: '0.06em'
        }}>
          {open ?
            <div style={{
              background: 'var(--bg-1)', border: '1px solid var(--line-2)',
              padding: 0, width: 260, boxShadow: '0 10px 30px rgba(0,0,0,0.5)'
            }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', borderBottom: '1px solid var(--line)' }}>
                <span style={{ color: 'var(--accent)', letterSpacing: '0.14em' }}>⚙ TWEAKS</span>
                <span onClick={() => setOpen(false)} style={{ cursor: 'pointer', color: 'var(--ink-faint)' }}>▾</span>
              </div>
              <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 16 }}>
                {/* Theme */}
                <div>
                  <div style={{ color: 'var(--ink-faint)', marginBottom: 6 }}>THEME</div>
                  <div style={{ display: 'flex', border: '1px solid var(--line-2)' }}>
                    {['dark', 'light'].map((t) =>
                      <div key={t} onClick={() => update('theme', t)} style={{
                        flex: 1, padding: '6px 0', textAlign: 'center', cursor: 'pointer',
                        background: state.theme === t ? 'var(--bg-3)' : 'transparent',
                        color: state.theme === t ? 'var(--ink)' : 'var(--ink-faint)',
                        borderRight: t === 'dark' ? '1px solid var(--line-2)' : 'none',
                        textTransform: 'uppercase'
                      }}>{t}</div>
                    )}
                  </div>
                </div>
                {/* Accent */}
                <div>
                  <div style={{ color: 'var(--ink-faint)', marginBottom: 6 }}>ACCENT</div>
                  <div style={{ display: 'flex', gap: 6 }}>
                    {accents.map(([k, hex]) =>
                      <div key={k} onClick={() => update('accent', hex)} style={{
                        width: 28, height: 28, background: hex, cursor: 'pointer',
                        border: state.accent === hex ? '2px solid var(--ink)' : '1px solid var(--line-2)'
                      }} title={k} />
                    )}
                  </div>
                </div>
                {/* Density */}
                <div>
                  <div style={{ color: 'var(--ink-faint)', marginBottom: 6 }}>DENSITY</div>
                  <div style={{ display: 'flex', border: '1px solid var(--line-2)' }}>
                    {['compact', 'comfortable'].map((t) =>
                      <div key={t} onClick={() => update('density', t)} style={{
                        flex: 1, padding: '6px 0', textAlign: 'center', cursor: 'pointer',
                        background: state.density === t ? 'var(--bg-3)' : 'transparent',
                        color: state.density === t ? 'var(--ink)' : 'var(--ink-faint)',
                        borderRight: t === 'compact' ? '1px solid var(--line-2)' : 'none',
                        textTransform: 'uppercase'
                      }}>{t}</div>
                    )}
                  </div>
                </div>
                {/* Landing headline style */}
                <div>
                  <div style={{ color: 'var(--ink-faint)', marginBottom: 6 }}>HEADLINE</div>
                  <div style={{ display: 'flex', flexDirection: 'column', border: '1px solid var(--line-2)' }}>
                    {['editorial', 'terminal'].map((t) =>
                      <div key={t} onClick={() => update('headline', t)} style={{
                        padding: '6px 10px', cursor: 'pointer',
                        background: state.headline === t ? 'var(--bg-3)' : 'transparent',
                        color: state.headline === t ? 'var(--ink)' : 'var(--ink-faint)',
                        borderBottom: t === 'editorial' ? '1px solid var(--line-2)' : 'none',
                        textTransform: 'uppercase'
                      }}>{t}</div>
                    )}
                  </div>
                </div>
              </div>

                      <div style={{ padding: '10px 16px', fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--accent)', letterSpacing: '0.14em' }}>{grp.group}</div>
                      <div style={{ gridColumn: 'span 5' }} />
                    </div>
                    {grp.rows.map((row, ri) => (
                      <div key={ri} style={{
                        display: 'grid', gridTemplateColumns: '2fr repeat(5, 1fr)',
                        borderBottom: gi === COMPARE_ROWS.length - 1 && ri === grp.rows.length - 1 ? 'none' : '1px solid var(--line)',
                        background: ri % 2 === 1 ? 'var(--bg-1)' : 'transparent'
                      }}>
                        <div style={{ padding: '11px 16px', fontSize: 13, color: 'var(--ink)' }}>{row.label}</div>
                        {row.vals.map((v, i) => (
                          <div key={i} style={{ padding: '11px 12px', borderLeft: '1px solid var(--line)', textAlign: 'center' }}>
                            {cell(v)}
                          </div>
                        ))}
                      </div>
                    ))}
                  </React.Fragment>
                ))}
              </div>
            </div>
          </section>

          {/* FAQ strip (short) */}
          <section style={{ padding: '56px 0', borderBottom: '1px solid var(--line)' }}>
            <div style={{ maxWidth: 1100, margin: '0 auto', padding: '0 32px' }}>
              <SectionTitle eyebrow="Questions" title="Essentials." />
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 22 }}>
                {[
                  { q: 'What counts as an analysis?', a: 'One COA + one contract, run through the extractor and rules engine, produces one analysis. Re-running after updating a document doesn\'t double-count within 24 hours.' },
                  { q: 'Do I need to configure templates?', a: 'No. The extractor reads GAFTA, FOSFA, ISO-style certificates, and most lab reports without setup. Paste the PDF, get the verdict.' },
                  { q: 'Is my data used to train AI?', a: 'Never. Your documents are used to answer your queries, and only your queries. We use Claude API with training opt-out enforced at the account level.' },
                  { q: 'What about EU VAT?', a: 'EU customers see VAT added at checkout, invoices are compliant.' },
                ].map((f, i) => (
                  <div key={i} style={{ borderTop: '1px solid var(--line)', paddingTop: 16 }}>
                    <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--ink)', lineHeight: 1.2 }}>{f.q}</div>
                    <div style={{ marginTop: 8, fontSize: 13.5, color: 'var(--ink-dim)', lineHeight: 1.55 }}>{f.a}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* CTA */}
          <section style={{ background: 'var(--bg-1)' }}>
            <div style={{ maxWidth: 1280, margin: '0 auto', padding: '56px 32px', display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 48, alignItems: 'center' }}>
              <div>
                <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--accent)', letterSpacing: '0.14em', marginBottom: 10 }}>START FREE · NO CARD</div>
                <h2 style={{ margin: 0, fontFamily: 'var(--serif)', fontWeight: 400, fontSize: 44, lineHeight: 1.05 }}>
                  First analysis is on us. Get the deal done.
                </h2>
              </div>
              <div>
                <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
                  <Btn variant="primary" size="lg" onClick={() => onNav('new')}>Create a Deal →</Btn>
                  <Btn variant="default" size="lg" onClick={() => onNav('products')}>Explore features</Btn>
                </div>
              </div>
            </div>
          </section>
        </div>
      );
    };

    window.Pricing = Pricing;


    // ===== app.jsx =====
    // Main app — routing + state

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accent": "#f5a524",
      "density": "compact",
      "headline": "editorial"
    }/*EDITMODE-END*/;

    const App = () => {
      const [route, setRoute] = React.useState(() => localStorage.getItem('cv-route') || 'home');
      const [dealId, setDealId] = React.useState(() => localStorage.getItem('cv-deal') || 'CV-2026-0417');
      const [editMode, setEditMode] = React.useState(false);
      const [tweaks, setTweaks] = React.useState(() => {
        try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('cv-tweaks') || '{}') }; }
        catch { return TWEAK_DEFAULTS; }
      });

      // persist
      React.useEffect(() => { localStorage.setItem('cv-route', route); }, [route]);
      React.useEffect(() => { localStorage.setItem('cv-deal', dealId); }, [dealId]);
      React.useEffect(() => { localStorage.setItem('cv-tweaks', JSON.stringify(tweaks)); }, [tweaks]);

      // Apply tweaks to :root
      React.useEffect(() => {
        document.documentElement.classList.toggle('theme-light', tweaks.theme === 'light');
        document.documentElement.style.setProperty('--accent', tweaks.accent);
      }, [tweaks]);

      // Edit mode protocol — register listener first, then announce availability
      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data;
          if (!d || typeof d !== 'object') return;
          if (d.type === '__activate_edit_mode') setEditMode(true);
          if (d.type === '__deactivate_edit_mode') setEditMode(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const nav = (k) => {
        setRoute(k);
        if (k === 'detail') setDealId(dealId || 'CV-2026-0417');
        window.scrollTo({ top: 0 });
      };
      const openDeal = (id) => { setDealId(id); setRoute('detail'); window.scrollTo({ top: 0 }); };

      let page = null;
      const props = { onNav: nav };
      if (route === 'home') page = <Landing {...props} />; else
        if (route === 'products') page = <Products {...props} />; else
          if (route === 'pricing') page = <Pricing {...props} />; else
            if (route === 'deals') page = <Deals {...props} onOpenDeal={openDeal} />; else
              if (route === 'new') page = <DealNew onSubmit={() => nav('detail')} onCancel={() => nav('deals')} />; else
                if (route === 'detail') page = <DealDetail dealId={dealId} onBack={() => nav('deals')} />;

      return (
        <div data-screen-label={`${route}`}>
          <Chrome route={route} onNav={nav}>{page}</Chrome>
          {editMode && <Tweaks state={tweaks} setState={setTweaks} />}
        </div>);

    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>

</html>
